global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # --- RAW PROM INTEGRATION ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # --- FASTAPI BACKEND TELEMETRY TARGETS ---
  - job_name: 'devops-api-gateway'
    static_configs:
      - targets: ['api:8000']
