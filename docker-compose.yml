version: '3.8'

services:
  # --- RELATIONAL DATA STORE ---
  db:
    image: postgres:15-alpine
    container_name: devops_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devops_prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- ASYNCHRONOUS WORK TASK BROKER ---
  redis:
    image: redis:7-alpine
    container_name: devops_redis
    ports:
      - "6379:6379"

  # --- VECTOR DATABASE FOR MEMORY ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: devops_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # --- FASTAPI GATEWAY API ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/devops_prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # --- CELERY BACKGROUND AGENT SWARM CLIENT ---
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops_celery_worker
    command: celery -A app.celery_worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/devops_prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - redis
      - db

  # --- OBSERVABILITY AND MONITORING STACK ---
  prometheus:
    image: prom/prometheus:latest
    container_name: devops_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: devops_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  pgdata:
  qdrant_data:
